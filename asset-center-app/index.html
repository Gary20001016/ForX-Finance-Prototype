<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>ForX Finance · 资产中心原型</title>
  <style>
    :root { --bg:#050706; --surface:#0d110f; --text:#f3f7f4; --muted:#717a74; --line:rgba(224,255,236,.105); --green:#63f6a2; --warning:#ffc45d; --error:#ff747d; }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; color:var(--text); background:#090b0a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    button,select,input { font:inherit; }
    button:focus-visible,select:focus-visible,input:focus-visible { outline:2px solid var(--green); outline-offset:2px; }
    .prototype-shell { min-height:100svh; display:grid; grid-template-columns:minmax(250px,330px) 390px; align-items:center; justify-content:center; gap:64px; padding:32px; }
    .prototype-meta h1 { margin:0; font-size:52px; line-height:.95; letter-spacing:-.05em; font-weight:580; }
    .prototype-meta h1 em { color:var(--green); font-style:normal; }
    .prototype-meta p { color:var(--muted); line-height:1.7; }
    .controls { display:grid; gap:10px; margin-top:24px; }
    .controls button,.controls select { min-height:42px; border:1px solid var(--line); border-radius:12px; background:var(--surface); color:var(--text); padding:0 12px; }
    .phone { width:390px; height:844px; overflow:hidden; border:1px solid #2b322e; border-radius:40px; background:var(--bg); box-shadow:0 38px 100px rgba(0,0,0,.55); position:relative; }
    #screen-root { min-height:100%; height:100%; overflow:hidden; }
    #sheet-root[hidden] { display:none; }
    #sheet-root { position:absolute; inset:0; z-index:20; display:flex; align-items:flex-end; background:rgba(0,0,0,.58); backdrop-filter:blur(5px); }
    .sheet { width:100%; max-height:82%; overflow:auto; padding:10px 20px 24px; border:1px solid var(--line); border-bottom:0; border-radius:24px 24px 0 0; background:#0b0f0c; box-shadow:0 -24px 60px rgba(0,0,0,.46); }
    .sheet-handle { width:34px; height:4px; border-radius:4px; background:#303732; margin:0 auto 17px; }
    .sheet-header { display:flex; align-items:flex-start; gap:12px; }
    .sheet-header h2 { margin:0; font-size:18px; }
    .sheet-header p { margin:5px 0 0; color:var(--muted); font-size:11px; line-height:1.55; }
    .sheet-close { margin-left:auto; width:34px; height:34px; border:0; border-radius:10px; background:#151a17; color:#aab3ad; }
    .sheet-list { margin-top:16px; border-top:1px solid var(--line); }
    .sheet-option { width:100%; min-height:52px; padding:0 3px; display:flex; align-items:center; border:0; border-bottom:1px solid rgba(255,255,255,.07); background:transparent; color:var(--text); text-align:left; }
    .sheet-option span { margin-left:auto; color:#68716b; font-size:10px; }
    .sheet-action { width:100%; min-height:46px; margin-top:18px; border:0; border-radius:12px; background:var(--green); color:#06110a; font-weight:650; }
    .sr-only { position:absolute!important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    .app-screen { min-height:100%; height:100%; background:var(--bg); position:relative; overflow-y:auto; scrollbar-width:none; }
    .app-screen::-webkit-scrollbar { display:none; }
    .status-bar { height:42px; padding:13px 22px 0; display:flex; justify-content:space-between; font-size:12px; font-weight:650; }
    .system-icons { display:flex; gap:7px; align-items:center; font-size:10px; }
    .account-nav { height:58px; display:flex; align-items:stretch; padding:0 15px 0 21px; border-bottom:1px solid var(--line); }
    .account-tabs { display:flex; gap:29px; }
    .account-tab { height:58px; border:0; background:transparent; color:#667069; padding:0; font-size:14px; font-weight:630; position:relative; }
    .account-tab[aria-selected="true"] { color:var(--text); }
    .account-tab[aria-selected="true"]::after { content:""; position:absolute; left:0; bottom:-1px; width:22px; height:2px; border-radius:2px; background:var(--green); box-shadow:0 0 12px rgba(99,246,162,.55); }
    .nav-tools { margin-left:auto; display:flex; align-items:center; gap:3px; }
    .icon-button { width:36px; height:36px; border:0; border-radius:11px; background:transparent; display:grid; place-items:center; color:#aab4ad; position:relative; }
    .icon-button svg { width:18px; height:18px; fill:none; stroke:currentColor; stroke-width:1.7; }
    .icon-button.notice::after { content:""; position:absolute; width:5px; height:5px; border-radius:50%; background:var(--green); right:7px; top:6px; box-shadow:0 0 7px rgba(99,246,162,.8); }
    .account-hero { min-height:216px; padding:24px 21px 18px; position:relative; overflow:hidden; border-bottom:1px solid var(--line); }
    .account-hero::after { content:""; position:absolute; width:190px; height:190px; right:-70px; top:-40px; border-radius:50%; background:rgba(99,246,162,.06); filter:blur(55px); pointer-events:none; }
    .hero-label { display:flex; align-items:center; gap:7px; color:#78817b; font-size:11px; }
    .visibility-toggle { width:20px; height:18px; border:0; background:transparent; color:#657069; padding:0; }
    .visibility-toggle svg { width:16px; fill:none; stroke:currentColor; }
    .hero-value { margin:7px 0 4px; font-size:38px; font-weight:570; line-height:1.1; letter-spacing:-.04em; font-variant-numeric:tabular-nums; }
    .hero-value small { color:#bcc4be; font-size:14px; font-weight:520; letter-spacing:0; }
    .hero-change { color:#717a74; font-size:11px; }
    .hero-change strong { color:var(--green); font-weight:560; margin-left:7px; }
    .hero-metrics { display:flex; gap:27px; margin-top:28px; }
    .hero-metrics span { color:#626c65; font-size:9px; }
    .hero-metrics b { display:block; color:#ccd4ce; font-size:12px; font-weight:560; margin-top:4px; font-variant-numeric:tabular-nums; }
    .mini-chart { position:absolute; right:12px; bottom:16px; width:164px; height:94px; border:0; padding:0; background:transparent; }
    .mini-chart svg { width:100%; height:100%; overflow:visible; }
    .home-actions { display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:8px; padding:14px 21px 13px; }
    .home-action { min-height:48px; border:1px solid var(--line); border-radius:13px; background:var(--surface); color:#cdd4cf; display:flex; justify-content:center; align-items:center; gap:7px; font-size:12px; font-weight:620; }
    .home-action.primary { border-color:var(--green); background:var(--green); color:#041009; box-shadow:0 8px 25px rgba(48,224,126,.16); }
    .home-action svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:1.8; }
    .home-body { padding:3px 21px 88px; }
    .section-heading { height:40px; display:flex; align-items:center; }
    .section-heading h2 { margin:0; font-size:14px; font-weight:650; }
    .section-heading small { margin-left:7px; color:#5f6962; font-size:9px; }
    .section-heading button { margin-left:auto; border:0; background:transparent; color:#69726c; font-size:10px; }
    .composition { height:3px; display:flex; overflow:hidden; border-radius:4px; background:#222824; }
    .composition span:first-child { width:74%; background:var(--green); }
    .composition span:last-child { width:26%; background:#407ce4; }
    .asset-row { min-height:66px; display:flex; align-items:center; border-bottom:1px solid rgba(230,255,239,.075); }
    .token-icon { width:35px; height:35px; border-radius:50%; display:grid; place-items:center; margin-right:11px; background:linear-gradient(145deg,#20b987,#0c7252); color:white; font-size:13px; font-weight:750; box-shadow:inset 0 0 0 1px rgba(255,255,255,.14); }
    .token-icon.usdc { background:linear-gradient(145deg,#4d96f0,#2364bf); }
    .asset-copy b,.activity-copy b { display:block; font-size:13px; }
    .asset-copy small,.activity-copy small { display:block; margin-top:2px; color:#626c65; font-size:9px; }
    .asset-amount { margin-left:auto; text-align:right; font-variant-numeric:tabular-nums; }
    .asset-amount b { display:block; font-size:13px; font-weight:590; }
    .asset-amount small { display:block; margin-top:2px; color:#626c65; font-size:9px; }
    .row-chevron { margin-left:10px; color:#58615b; }
    .activity-row { display:flex; align-items:center; padding:10px 0 3px; }
    .activity-icon { width:31px; height:31px; border:1px solid rgba(255,255,255,.06); border-radius:9px; background:#101512; color:var(--green); display:grid; place-items:center; margin-right:10px; }
    .activity-icon svg { width:14px; fill:none; stroke:currentColor; }
    .activity-value { margin-left:auto; text-align:right; }
    .activity-value b { color:var(--green); display:block; font-size:10px; }
    .activity-value small { color:#606a63; font-size:8px; }
    .contract-grid { margin-top:17px; border-top:1px solid var(--line); }
    .metric-row { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid rgba(255,255,255,.07); }
    .metric { padding:13px 0; }
    .metric:nth-child(even) { text-align:right; }
    .metric label { display:block; color:#68716b; font-size:9px; }
    .metric b { display:block; margin-top:4px; font-size:13px; font-weight:570; }
    .positive { color:var(--green)!important; }
    .bottom-nav { position:absolute; left:0; right:0; bottom:0; z-index:5; height:72px; padding:9px 10px 5px; display:grid; grid-template-columns:repeat(5,1fr); background:rgba(5,7,6,.95); border-top:1px solid var(--line); backdrop-filter:blur(18px); }
    .bottom-item { border:0; background:transparent; color:#515a54; font-size:8px; position:relative; }
    .bottom-item svg { width:19px; height:19px; margin:0 auto 5px; display:block; fill:none; stroke:currentColor; stroke-width:1.6; }
    .bottom-item[aria-current="page"] { color:var(--text); }
    .bottom-item[aria-current="page"] svg { color:var(--green); }
    .bottom-item[aria-current="page"]::before { content:""; position:absolute; top:-10px; left:50%; width:18px; height:2px; transform:translateX(-50%); background:var(--green); box-shadow:0 0 10px var(--green); }
    .subpage { min-height:100%; padding-bottom:30px; }
    .subpage-header { height:56px; padding:0 18px; display:flex; align-items:center; border-bottom:1px solid var(--line); }
    .back-button { width:36px; height:36px; border:0; background:transparent; color:var(--text); font-size:25px; padding:0; }
    .subpage-header h1 { margin:0 0 0 5px; font-size:17px; }
    .placeholder-page { padding:28px 20px; color:var(--muted); }
    .form-page { padding:17px 20px 36px; }
    .field-label { display:flex; align-items:center; margin:0 0 8px; color:#7b847e; font-size:10px; }
    .field-label span { margin-left:auto; color:#626c65; }
    .selector-button { width:100%; min-height:54px; margin-bottom:16px; padding:0 14px; display:flex; align-items:center; border:1px solid var(--line); border-radius:13px; background:var(--surface); color:var(--text); text-align:left; }
    .selector-button b { font-size:13px; }
    .selector-button small { margin-left:8px; color:#69726c; }
    .selector-button i { margin-left:auto; color:#69726c; font-style:normal; }
    .method-tabs { display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:4px; margin:3px 0 17px; border:1px solid var(--line); border-radius:12px; background:#090c0a; }
    .method-tabs.single { grid-template-columns:1fr; }
    .method-tab { min-height:39px; border:0; border-radius:9px; background:transparent; color:#69726c; font-size:11px; }
    .method-tab[aria-selected="true"] { background:#1a211d; color:var(--text); }
    .deposit-card { padding:16px; border:1px solid var(--line); border-radius:16px; background:linear-gradient(145deg,rgba(99,246,162,.035),transparent),#0b0f0c; }
    .qr { width:132px; height:132px; margin:3px auto 16px; padding:9px; border-radius:12px; background:#f1f5f2; display:grid; grid-template-columns:repeat(9,1fr); gap:2px; }
    .qr i { background:#07100a; border-radius:1px; }
    .qr i:nth-child(3n+2),.qr i:nth-child(5n) { background:transparent; }
    .prototype-badge { display:block; width:max-content; margin:-7px auto 15px; padding:4px 7px; border-radius:999px; background:#161c18; color:#7f8882; font-size:8px; }
    .address-box { padding:12px; border:1px solid rgba(255,255,255,.08); border-radius:11px; background:#080b09; }
    .address-box small { display:block; color:#68716b; font-size:8px; }
    .address-line { display:flex; align-items:center; gap:8px; margin-top:5px; }
    .address-line code { min-width:0; overflow:hidden; text-overflow:ellipsis; color:#d8dfda; font-size:10px; }
    .text-button { margin-left:auto; border:0; background:transparent; color:var(--green); font-size:9px; }
    .notice-box { margin-top:12px; padding:11px 12px; border-left:2px solid var(--warning); border-radius:0 9px 9px 0; background:rgba(255,196,93,.045); color:#848d87; font-size:9px; line-height:1.55; }
    .network-facts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .network-fact { padding:10px; border:1px solid rgba(255,255,255,.07); border-radius:10px; }
    .network-fact small { display:block; color:#626c65; font-size:8px; }
    .network-fact b { display:block; margin-top:4px; font-size:10px; }
    .demo-button { width:100%; min-height:43px; margin-top:14px; border:1px dashed rgba(99,246,162,.25); border-radius:11px; background:rgba(99,246,162,.045); color:#9dd8b2; font-size:10px; }
    .wallet-account { display:flex; align-items:center; gap:10px; margin-bottom:13px; padding:12px; border:1px solid var(--line); border-radius:12px; }
    .wallet-mark { width:35px; height:35px; border-radius:11px; background:linear-gradient(145deg,#f29c38,#c56f24); display:grid; place-items:center; color:#171009; font-weight:800; }
    .wallet-account b { display:block; font-size:11px; }
    .wallet-account small { display:block; margin-top:3px; color:#69726c; font-size:8px; }
    .wallet-account .match { margin-left:auto; color:var(--green); font-size:8px; }
    .wallet-account .mismatch { margin-left:auto; color:var(--error); font-size:8px; }
    .amount-input { width:100%; height:58px; padding:0 14px; border:1px solid var(--line); border-radius:13px; background:#090c0a; color:var(--text); font-size:23px; }
    .field-help { display:flex; justify-content:space-between; margin:7px 2px 14px; color:#68716b; font-size:8px; }
    .primary-button { width:100%; min-height:48px; border:0; border-radius:12px; background:var(--green); color:#06110a; font-weight:680; }
    .primary-button:disabled { background:#1d2520; color:#58625b; }
    .secondary-link { width:100%; min-height:34px; margin-top:5px; border:0; background:transparent; color:#747e77; font-size:9px; }
    .wallet-note { margin-top:12px; color:#6d766f; font-size:8px; line-height:1.55; text-align:center; }
    .progress-page { padding:18px 19px 30px; }
    .deposit-amount { text-align:center; padding:7px 0 19px; }
    .deposit-amount .token-icon { margin:0 auto 8px; }
    .deposit-amount strong { display:block; font-size:27px; }
    .deposit-amount small { display:block; margin-top:3px; color:#68716b; font-size:9px; }
    .stepper { display:grid; grid-template-columns:repeat(3,1fr); position:relative; margin:0 6px 23px; }
    .stepper::before { content:""; position:absolute; left:16.6%; right:16.6%; top:9px; height:1px; background:#28302b; }
    .stepper-stage { position:relative; z-index:1; text-align:center; }
    .stepper-stage i { width:19px; height:19px; margin:auto; display:grid; place-items:center; border:1px solid #313a34; border-radius:50%; background:#151a17; color:#626c65; font-style:normal; font-size:8px; }
    .stepper-stage span { display:block; margin-top:7px; color:#656e68; font-size:8px; }
    .stepper-stage.done i,.stepper-stage.current i { border-color:var(--green); background:var(--green); color:#06110a; }
    .stepper-stage.current i { box-shadow:0 0 0 5px rgba(99,246,162,.08); }
    .stepper-stage.done span,.stepper-stage.current span { color:#b9c2bc; }
    .progress-card { padding:16px; border:1px solid var(--line); border-radius:15px; background:linear-gradient(145deg,rgba(99,246,162,.035),transparent),#0b0f0c; }
    .progress-card.warning { border-color:rgba(255,196,93,.23); }
    .status-heading { display:flex; gap:11px; align-items:flex-start; }
    .status-dot { width:10px; height:10px; margin:5px 0 0 4px; border-radius:50%; background:var(--green); box-shadow:0 0 0 6px rgba(99,246,162,.08); }
    .progress-card.warning .status-dot { background:var(--warning); box-shadow:0 0 0 6px rgba(255,196,93,.08); }
    .status-heading h2 { margin:0 0 5px; font-size:14px; }
    .status-heading p { margin:0; color:#828b85; font-size:9px; line-height:1.55; }
    .confirm-row { display:flex; justify-content:space-between; margin-top:16px; color:#707972; font-size:9px; }
    .confirm-row b { color:#c8d0ca; }
    .progress-bar { height:4px; margin-top:8px; overflow:hidden; border-radius:4px; background:#252b27; }
    .progress-bar i { display:block; width:56%; height:100%; border-radius:4px; background:var(--warning); }
    .can-leave { margin-top:12px; padding:10px 11px; border-left:2px solid var(--green); background:#0e1410; color:#7d8780; font-size:8px; line-height:1.55; }
    .detail-list { margin-top:14px; border-top:1px solid var(--line); }
    .detail-line { display:flex; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:8px; }
    .detail-line span:first-child { color:#68716b; }
    .detail-line span:last-child { margin-left:auto; color:#b8c1bb; }
    .scenario-select { width:100%; height:38px; margin-top:13px; padding:0 10px; border:1px solid var(--line); border-radius:10px; background:var(--surface); color:#aab3ad; font-size:9px; }
    .exception-copy { min-height:0; margin-top:9px; color:var(--warning); font-size:8px; line-height:1.55; }
    .input-shell { position:relative; margin-bottom:7px; }
    .text-input { width:100%; min-height:52px; padding:0 42px 0 13px; border:1px solid var(--line); border-radius:12px; background:#090c0a; color:var(--text); font-size:11px; }
    .input-action { position:absolute; right:7px; top:8px; width:36px; height:36px; border:0; border-radius:9px; background:#141a16; color:#879089; font-size:15px; }
    .inline-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px; }
    .inline-actions button { min-height:40px; border:1px solid var(--line); border-radius:10px; background:#101512; color:#9ba49e; font-size:9px; }
    .validation { min-height:18px; margin:3px 2px 7px; color:var(--error); font-size:8px; line-height:1.45; }
    .amount-panel { padding:13px; margin-bottom:12px; border:1px solid var(--line); border-radius:13px; background:var(--surface); }
    .amount-panel .amount-input { border:0; padding:0; background:transparent; }
    .amount-tools { display:flex; justify-content:space-between; align-items:center; margin-top:6px; color:#667069; font-size:8px; }
    .amount-tools button { border:0; background:transparent; color:var(--green); font-size:9px; }
    .calculation { margin:12px 0 15px; border-top:1px solid var(--line); }
    .calculation-row { display:flex; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); color:#68716b; font-size:9px; }
    .calculation-row b { margin-left:auto; color:#c5cdc7; font-weight:550; }
    .calculation-row.received b { color:var(--green); font-size:11px; }
    .review-card { padding:15px; border:1px solid var(--line); border-radius:15px; background:#0b0f0c; }
    .review-amount { text-align:center; padding:7px 0 17px; border-bottom:1px solid var(--line); }
    .review-amount small { display:block; color:#68716b; font-size:9px; }
    .review-amount strong { display:block; margin-top:5px; font-size:25px; }
    .risk-check { display:flex; gap:9px; margin:13px 0; color:#7a837d; font-size:8px; line-height:1.55; }
    .risk-check input { margin-top:2px; accent-color:var(--green); }
    .auth-page { padding:26px 20px; }
    .auth-symbol { width:48px; height:48px; margin:0 auto 15px; border-radius:15px; background:rgba(99,246,162,.08); color:var(--green); display:grid; place-items:center; font-size:20px; }
    .auth-page h2 { margin:0; text-align:center; font-size:19px; }
    .auth-page>p { margin:8px auto 20px; max-width:290px; color:#7b847e; font-size:10px; line-height:1.6; text-align:center; }
    .secret-box { padding:13px; margin-bottom:13px; border:1px dashed rgba(99,246,162,.24); border-radius:12px; background:#0d1410; text-align:center; }
    .secret-box code { color:#bfe6cc; font-size:10px; letter-spacing:.08em; }
    .confirm-check { display:flex; gap:9px; margin:10px 0 15px; color:#7b847e; font-size:9px; }
    .confirm-check input { accent-color:var(--green); }
    .otp-input { width:100%; height:54px; margin-bottom:13px; border:1px solid var(--line); border-radius:12px; background:#090c0a; color:var(--text); text-align:center; font-size:20px; letter-spacing:.35em; }
    .address-list { border-top:1px solid var(--line); }
    .address-item { width:100%; min-height:64px; display:flex; align-items:center; border:0; border-bottom:1px solid rgba(255,255,255,.07); background:transparent; color:inherit; text-align:left; }
    .address-item .wallet-mark { width:34px; height:34px; margin-right:10px; font-size:11px; }
    .address-item b { display:block; font-size:11px; }
    .address-item small { display:block; margin-top:3px; color:#68716b; font-size:8px; }
    .address-item>span:last-child { margin-left:auto; color:#68716b; font-size:9px; }

v></div><select id="deposit-scenario" class="scenario-select" aria-label="充值异常场景"><option value="normal" ${dep.scenario==='normal'?'selected':''}>正常流程</option><option value="below-minimum">低于最小充值金额</option><option value="congestion">网络确认较慢</option><option value="mismatch">币种或网络不匹配</option><option value="failed">链上交易失败</option><option value="credit-delay">入账延迟</option></select><p class="exception-copy" data-deposit-exception>${depositException()}</p><button class="primary-button" data-advance-deposit type="button">${dep.stage==='waiting'?'模拟检测到转账':dep.stage==='confirming'?'完成网络确认':dep.stage==='crediting'?'完成入账':'返回资产中心'}</button></div></div>`;

      if(target.id==='confirm-mfa-setup'){
        const confirmed=document.querySelector('#mfa-secret-confirmed').checked, code=document.querySelector('#mfa-code').value;
        if(!confirmed||code!=='123456'){ document.querySelector('#mfa-setup-error').textContent='请确认已保存密钥，并输入示例验证码 123456。'; return; }
        state.session.mfaBound=true; document.querySelector('#session-mode').value='email-bound'; state.routeStack.pop(); state.route='withdraw-review'; render(); announce('MFA 已绑定'); return;
      }
      if(target.id==='confirm-mfa-verify'){
        if(document.querySelector('#mfa-verify-code').value!=='123456'){ document.querySelector('#mfa-verify-error').textContent='验证码错误，请输入示例验证码 123456。'; return; }
        return startWithdrawal();
      }
      if(target.id==='add-address'){ state.pendingAddress={label:'',network:state.withdrawalDraft.network,address:''}; return navigate('add-address'); }
      if(target.dataset.addressIndex!==undefined){ const item=state.addressBook[Number(target.dataset.addressIndex)]; state.withdrawalDraft.network=item.network; state.withdrawalDraft.address=item.address; goBack(); announce('已选择 '+item.label); return; }
      if(target.id==='address-network') return simpleSelectionSheet('选择地址网络',CONFIG.networks,'data-address-network');
      if(target.id==='save-address'){
        if(state.session.type==='wallet') return addressSignatureSheet();
        if(state.session.mfaBound) return addressMfaSheet();
        state.pendingAction='save-address'; return navigate('mfa-setup');
      }
      if(target.dataset.advanceWithdrawal!==undefined) return advanceWithdrawal();
      if(target.matches('.visibility-toggle')){ state.valuesHidden=!state.valuesHidden; render(); announce(state.valuesHidden?'资产金额已隐藏':'资产金额已显示'); }
    });
    root.addEventListener('input',event=>{
      if(event.target.id==='wallet-deposit-amount'){ state.depositDraft.amount=event.target.value; const network=NETWORKS[state.depositDraft.network]; document.querySelector('#launch-wallet').disabled=!(Number(event.target.value)>=network.min[state.depositDraft.token]&&state.depositDraft.walletMatches); }
      if(event.target.id==='withdraw-address'||event.target.id==='withdraw-amount'){
        if(event.target.id==='withdraw-address') state.withdrawalDraft.address=event.target.value.trim(); else state.withdrawalDraft.amount=event.target.value;
        const error=document.querySelector('#withdraw-error'); if(error) error.textContent=withdrawalError();
        const received=document.querySelector('[data-withdraw-received]'); if(received) received.textContent=`${format(Math.max(0,(Number(state.withdrawalDraft.amount)||0)-WITHDRAW_FEES[state.withdrawalDraft.network]))} ${state.withdrawalDraft.token}`;
        const review=document.querySelector('#review-withdrawal'); if(review) review.disabled=!withdrawalValid();
      }
      if(event.target.id==='address-label'||event.target.id==='address-value'){
        if(event.target.id==='address-label') state.pendingAddress.label=event.target.value; else state.pendingAddress.address=event.target.value.trim();
        const error=document.querySelector('#address-error'); if(error) error.textContent=state.pendingAddress.address&&!validAddress(state.pendingAddress.address,state.pendingAddress.network)?'地址格式与所选网络不匹配。':'';
        const save=document.querySelector('#save-address'); if(save) save.disabled=!(state.pendingAddress.label&&validAddress(state.pendingAddress.address,state.pendingAddress.network));
      }
    });
    root.addEventListener('change',event=>{
      if(event.target.id==='deposit-scenario'){ state.deposit.scenario=event.target.value; render(); }
      if(event.target.id==='withdraw-risk'){ state.withdrawalDraft.acknowledged=event.target.checked; document.querySelector('#submit-withdrawal').disabled=!event.target.checked; }
    });
    sheetRoot.addEventListener('click',event=>{
      const target=event.target.closest('button'); if(!target) return;
      if(target.dataset.sheetClose!==undefined) return closeSheet();
      if(target.id==='acknowledge-mismatch') return closeSheet();
      if(target.dataset.token){ state.depositDraft.token=target.dataset.token; closeSheet(); render(); return; }
      if(target.dataset.network){ state.depositDraft.network=target.dataset.network; if(NETWORKS[target.dataset.network].family==='tron') state.depositDraft.method='address'; closeSheet(); render(); return; }
      if(target.id==='reconnect-wallet'){ state.depositDraft.walletConnected=true; closeSheet(); render(); announce('钱包连接已恢复'); }
      if(target.dataset.withdrawToken){ state.withdrawalDraft.token=target.dataset.withdrawToken; closeSheet(); render(); return; }
      if(target.dataset.withdrawNetwork){ state.withdrawalDraft.network=target.dataset.withdrawNetwork; state.withdrawalDraft.address=''; closeSheet(); render(); return; }
      if(target.dataset.addressNetwork){ state.pendingAddress.network=target.dataset.addressNetwork; state.pendingAddress.address=''; closeSheet(); render(); return; }
      if(target.id==='confirm-signature'){ closeSheet(); savePendingAddress(); return; }
      if(target.id==='confirm-address-mfa'){
        const code=sheetRoot.querySelector('#address-mfa-code').value;
        if(code!=='123456'){ sheetRoot.querySelector('#address-mfa-error').textContent='验证码错误，请输入示例验证码 123456。'; return; }
        closeSheet(); savePendingAddress();
      }
    });
    document.addEventListener('keydown',event=>{ if(event.key==='Escape'&&!sheetRoot.hidden) closeSheet(); });
    document.querySelector('#reset-prototype').addEventListener('click',resetPrototype);
    document.querySelector('#session-mode').addEventListener('change',event=>{ const value=event.target.value; state.session={ type:value.startsWith('email')?'email':'wallet', mfaBound:value==='email-bound' }; render(); announce('登录状态已切换'); });
    window.assetPrototype={ getState:()=>structuredClone(state), navigate, reset:resetPrototype };
    render();
  </script>
</body>
</html>
